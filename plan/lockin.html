<!doctype html>
<html lang="en" data-theme="night">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d141c">
<title>Lock In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root[data-theme="night"]{--bg:#0d141c;--card:#111c27;--edge:#1d2c3a;--ink:#eaf2fb;--mut:#8ba0b6;--dim:#5f7386;--gold:#e8c65a;--done:#1f7a4d;--done-ink:#eafff2;--heroA:#16324a;--heroB:#0d141c;--glow:rgba(232,198,90,.20);--pulseglow:rgba(232,198,90,.55);--sea:#3f7fca;--seabg:rgba(47,128,184,.14);--sea-ink:#cfe6f7;--sea-ink2:#7fb8e6;color-scheme:dark}
  :root[data-theme="dawn"]{--bg:#f4ecdd;--card:#fffdf8;--edge:#e4dccb;--ink:#2a2620;--mut:#7a7160;--dim:#a99a7f;--gold:#b8860b;--done:#2e7d54;--done-ink:#ffffff;--heroA:#fffdf8;--heroB:#f4ecdd;--glow:rgba(184,134,11,.14);--pulseglow:rgba(184,134,11,.42);--sea:#2f6fb0;--seabg:rgba(47,111,176,.10);--sea-ink:#235d92;--sea-ink2:#2f6fb0;color-scheme:light}
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0 auto;max-width:820px;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;overflow-x:hidden;
    padding:20px 16px;padding-top:max(20px,env(safe-area-inset-top));
    padding-bottom:calc(78px + env(safe-area-inset-bottom))}
  @media (prefers-reduced-motion:no-preference){body{animation:fade .5s ease both}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  h1,.num,.hname,.vhead{font-family:'Fraunces',Georgia,serif}
  button{font:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
  h1{font-size:22px;font-weight:700;margin:0;line-height:1}
  .date{display:block;font-size:12px;color:var(--mut);margin-top:3px}
  #themeToggle{flex:none;background:none;border:1px solid var(--edge);color:var(--mut);
    border-radius:10px;padding:8px 12px;font-size:12px;font-weight:500;cursor:pointer;
    transition:border-color .15s,color .15s,transform .08s}
  #themeToggle:active{transform:scale(.96)}
  .cardcenter{text-align:center}
  .ringwrap{position:relative;width:130px;height:130px;margin:4px auto 10px}
  .ring{position:absolute;inset:0;transform:rotate(-90deg)}
  .ring .track{fill:none;stroke:var(--edge);stroke-width:8}
  .ring .prog{fill:none;stroke:var(--gold);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.2,.8,.2,1)}
  .ringmid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ringmid .num{font-family:'Fraunces',serif;font-weight:900;font-size:42px;line-height:1;color:var(--gold);text-shadow:0 0 24px var(--glow)}
  .ringmid .numlabel{font-size:8px;letter-spacing:.14em;color:var(--mut);margin-top:3px}
  .togoal{font-size:12px;color:var(--mut);margin-bottom:12px}
  .togoal b{color:var(--gold);font-family:'Fraunces',serif}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .hcard{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:16px}
  .hcard.wide{grid-column:1/-1}
  .hname{font-weight:700;font-size:16px;margin-bottom:10px}
  .pills{display:flex;gap:6px;flex-wrap:wrap}
  .pill,.toggle{cursor:pointer;font-weight:600;border-radius:10px;border:1px solid var(--edge);color:var(--mut);background:none;
    transition:background-color .15s,color .15s,border-color .15s,transform .08s}
  .pill:active,.toggle:active{transform:scale(.96)}
  .pill{flex:1;min-width:52px;text-align:center;font-size:12px;padding:12px 4px}
  .pill.on{background:var(--done);border-color:var(--done);color:var(--done-ink)}
  .toggle{display:inline-block;font-size:14px;padding:12px 18px;margin-top:2px}
  .toggle.on{background:var(--done);border-color:var(--done);color:var(--done-ink)}
  .note{font-size:12px;color:var(--mut);margin-top:10px;line-height:1.4}
  .wklabel{font-size:10px;letter-spacing:.14em;color:var(--dim);margin:14px 0 6px}
  .dots{display:flex;gap:6px;flex-wrap:wrap}
  .dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;border:1.4px dashed var(--edge);color:var(--dim);
    transition:background-color .15s,border-color .15s}
  .dot.on{background:var(--gold);border:1.4px solid var(--gold);color:var(--bg)}
  #banner{display:none;background:#3a2a12;color:#f4d9a6;border:1px solid #6b4f1e;border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:14px;line-height:1.4}
  :root[data-theme="dawn"] #banner{background:#fbf0d8;color:#7a5a1e;border-color:#e2c98f}
  #banner.show{display:block}

  .spark{position:fixed;border-radius:50%;background:var(--gold);pointer-events:none;z-index:50}
  .toast{position:fixed;left:50%;top:38%;z-index:60;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:12px}
  .toast .cap{font-family:'Fraunces',serif;font-weight:900;font-size:26px;color:var(--gold);text-shadow:0 0 30px rgba(232,198,90,.5);text-align:center}
  /* Always-on tap feedback (plain CSS, runs regardless of reduce-motion / WAAPI). */
  .hcard.tapped{animation:cardpulse .55s ease}
  @keyframes cardpulse{0%{box-shadow:0 0 0 0 rgba(0,0,0,0)}35%{box-shadow:0 0 26px 2px var(--pulseglow)}100%{box-shadow:0 0 0 0 rgba(0,0,0,0)}}
  .ringmid .num.bump{animation:numbump .42s cubic-bezier(.2,.8,.2,1)}
  @keyframes numbump{40%{transform:scale(1.16)}100%{transform:scale(1)}}

  .urge{margin-top:14px;padding-top:14px;border-top:1px solid var(--edge)}
  .urgebtn{width:100%;border:1px solid var(--sea);background:var(--seabg);color:var(--sea-ink);
    border-radius:12px;padding:13px;font:600 14px/1 'Inter';cursor:pointer;transition:transform .08s,background .15s}
  .urgebtn:active{transform:scale(.97)}
  .urgestat{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;font-size:11px;color:var(--mut)}
  .urgecount b{font-family:'Fraunces',serif;color:var(--sea-ink2)}
  .wavebadge svg{display:block}
  #ov{position:fixed;inset:0;background:#07101a;display:none;flex-direction:column;align-items:center;z-index:70;overflow:hidden}
  #ov.on{display:flex}
  #ov canvas{position:absolute;inset:0;width:100%;height:100%}
  .ovtop{position:relative;z-index:2;padding:calc(40px + env(safe-area-inset-top)) 22px 0;text-align:center;max-width:420px}
  .ovtop .phase{font-family:'Fraunces',serif;font-size:24px;font-weight:700;margin-bottom:8px;color:#eaf2fb}
  .ovtop .guide{font-size:14px;color:#bcd4ea;line-height:1.5}
  .breath{position:relative;z-index:2;margin:auto;width:170px;height:170px;display:flex;align-items:center;justify-content:center}
  .breath .bring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(120,190,240,.5);
    background:radial-gradient(circle,rgba(87,166,216,.25),transparent 70%);transition:transform .2s linear}
  .breath .word{font-size:15px;letter-spacing:.1em;color:#dbeeff;z-index:3}
  .ovbtns{position:relative;z-index:2;padding:0 22px calc(38px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px}
  .ovbtns button{border:none;border-radius:12px;padding:15px;font:600 15px/1 'Inter';cursor:pointer}
  #okBtn{background:rgba(255,255,255,.10);color:#dbeeff;border:1px solid rgba(120,190,240,.3)}
  #doneBtn{background:var(--gold);color:#0d141c;display:none}

  .view{display:none}
  .view.on{display:block}
  .vhead{font-weight:700;font-size:22px;text-align:center;margin:2px 0 4px}
  .vlead{color:var(--mut);font-size:13px;text-align:center;margin:0 0 14px}
  #awardsTotals{display:block;text-align:center;color:var(--gold);font-family:'Fraunces',serif;font-size:13px;margin:0 0 16px}
  .explain{position:sticky;top:8px;z-index:5;background:var(--card);border:1px solid var(--edge);border-radius:12px;
    padding:12px 14px;font-size:13px;color:var(--mut);min-height:44px;display:flex;align-items:center;justify-content:center;
    text-align:center;margin-bottom:18px}
  .explain b{font-family:'Fraunces',serif;color:var(--gold);font-weight:700}
  .agrid{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
  .amed{width:96px;background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:14px 8px 12px;
    display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .15s,transform .08s}
  .amed:active{transform:scale(.97)}
  .amed.sel{border-color:var(--gold)}
  .amed.locked{opacity:.55}
  .amed.locked svg{filter:blur(3px) grayscale(.55)}
  .amed .nm{font-size:11px;color:var(--ink)}
  .amed.locked .nm{color:var(--mut)}
  .amed .ct{font-family:'Fraunces',serif;font-size:12px;color:var(--gold)}
  .amed.locked .ct{color:var(--dim)}
  .tabs{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(13,20,28,.92);backdrop-filter:blur(8px);
    border-top:1px solid var(--edge);padding-bottom:env(safe-area-inset-bottom);z-index:30}
  :root[data-theme="dawn"] .tabs{background:rgba(244,236,221,.92)}
  .tabs button{flex:1;background:none;border:none;color:var(--mut);font:600 12px/1 'Inter';padding:12px 0 14px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:5px;position:relative}
  .tabs button.on{color:var(--gold)}
  .tabs button.on::before{content:"";position:absolute;top:0;left:24%;right:24%;height:2px;background:var(--gold);border-radius:2px}
  .tabs .ic{width:20px;height:20px}

  /* Phone: not the desktop layout squished — a genuinely vertical layout. */
  @media (max-width:620px){
    .grid{grid-template-columns:1fr}
    /* Rings sit a touch larger and centered on phones. */
    .ringwrap{width:138px;height:138px}
    /* Full-thumb targets, roomier cards, medals stay fully visible (wrapped). */
    .toggle{display:block;width:100%;padding:15px;font-size:15px}
    .hcard{padding:18px}
    .pill{padding:14px 4px}
    /* Center the week strip within each card. */
    .wklabel{text-align:center}
    .dots{justify-content:center}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1 id="appName">Lock In</h1>
      <span class="date" id="today"></span>
    </div>
    <button id="themeToggle" type="button">☀ Dawn</button>
  </div>

  <div id="banner"></div>

  <div class="view on" id="trackView">
  <div class="grid">
    <div class="hcard wide cardcenter">
      <div class="hname">Prayers</div>
      <div class="ringwrap">
        <svg class="ring" viewBox="0 0 130 130"><circle class="track" cx="65" cy="65" r="56"/><circle class="prog" id="ringPrayers" cx="65" cy="65" r="56"/></svg>
        <div class="ringmid"><div class="num" id="numPrayers">0</div><div class="numlabel">DAY STREAK</div></div>
      </div>
      <div class="togoal" id="goalPrayers"></div>
      <div class="pills" id="prayerPills"></div>
      <div class="note" id="prayerNote"></div>
      <div class="wklabel">THIS WEEK</div>
      <div class="dots" id="prayerWeek"></div>
    </div>

    <div class="hcard cardcenter">
      <div class="hname">Sober</div>
      <div class="ringwrap">
        <svg class="ring" viewBox="0 0 130 130"><circle class="track" cx="65" cy="65" r="56"/><circle class="prog" id="ringSober" cx="65" cy="65" r="56"/></svg>
        <div class="ringmid"><div class="num" id="numSober">0</div><div class="numlabel">DAY STREAK</div></div>
      </div>
      <div class="togoal" id="goalSober"></div>
      <button class="toggle" id="soberToggle" type="button">Mark clean today</button>
      <div class="wklabel">THIS WEEK</div>
      <div class="dots" id="soberWeek"></div>
      <div class="urge">
        <button class="urgebtn" id="urgeBtn" type="button">Ride out an urge</button>
        <div class="urgestat"><span class="wavebadge" id="waveBadge"></span><span class="urgecount"><b id="urToday">0</b> today · <b id="urAll">0</b> all-time</span></div>
      </div>
    </div>

    <div class="hcard cardcenter">
      <div class="hname">Workout</div>
      <div class="ringwrap">
        <svg class="ring" viewBox="0 0 130 130"><circle class="track" cx="65" cy="65" r="56"/><circle class="prog" id="ringWorkout" cx="65" cy="65" r="56"/></svg>
        <div class="ringmid"><div class="num" id="numWorkout">0</div><div class="numlabel">WEEK STREAK</div></div>
      </div>
      <div class="togoal" id="goalWorkout"></div>
      <button class="toggle" id="workoutToggle" type="button">Log a session</button>
      <div class="wklabel" id="workoutSessions">SESSIONS THIS WEEK</div>
      <div class="dots" id="workoutWeek"></div>
    </div>
  </div>
  </div>

  <div class="view" id="awardsView">
    <div class="vhead">Achievements</div>
    <div class="vlead">Everything you've earned — and what's still out there.</div>
    <div id="awardsTotals"></div>
    <div class="explain" id="explain">Tap a medal to see what it earns.</div>
    <div class="agrid" id="awardsGrid"></div>
  </div>

  <nav class="tabs">
    <button id="tabTrack" class="on" type="button"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 13a8 8 0 1 1 16 0"/><path d="M12 13l3-3"/></svg>Track</button>
    <button id="tabAwards" type="button"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="9" r="5"/><path d="M9 13l-2 8 5-3 5 3-2-8"/></svg>Achievements</button>
  </nav>

  <div id="ov" aria-hidden="true">
    <canvas id="ovCanvas"></canvas>
    <div class="ovtop"><div class="phase" id="ovPhase">Building</div><div class="guide" id="ovGuide">It rises and passes. Ride it.</div></div>
    <div class="breath"><div class="bring" id="ovRing"></div><div class="word" id="ovWord">Breathe in</div></div>
    <div class="ovbtns"><button id="okBtn" type="button">I'm okay now</button><button id="doneBtn" type="button">Done</button></div>
  </div>

  <script>
  // Theme toggle (persisted). Rest of behaviour added in Task 7.
  (function () {
    var root = document.documentElement;
    var btn = document.getElementById('themeToggle');
    try { var saved = localStorage.getItem('lockinTheme'); if (saved) root.setAttribute('data-theme', saved); } catch (e) {}
    var meta = document.querySelector('meta[name="theme-color"]');
    function sync() {
      var night = root.getAttribute('data-theme') === 'night';
      btn.textContent = night ? '☀ Dawn' : '☾ Night';
      if (meta) meta.setAttribute('content', night ? '#0d141c' : '#f4ecdd');
    }
    btn.addEventListener('click', function () {
      var next = root.getAttribute('data-theme') === 'night' ? 'dawn' : 'night';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('lockinTheme', next); } catch (e) {}
      sync();
    });
    sync();
  })();

  (function () {
    var POLL = 'lockin';
    var PRAYERS = ['subuh', 'zohor', 'asar', 'maghrib', 'isya'];
    var LABELS = { subuh: 'Subuh', zohor: 'Zohor', asar: 'Asar', maghrib: 'Maghrib', isya: "Isya'" };
    var TIER_CAP = { bronze: 'Bronze', silver: 'Silver', gold: 'Gold', sapphire: 'Sapphire', diamond: 'Diamond', comeback: 'Comeback' };
    var DAY_TIERS = [['bronze', 7], ['silver', 30], ['gold', 90], ['sapphire', 180], ['diamond', 365]];
    var WEEK_TIERS = [['bronze', 4], ['silver', 12], ['gold', 26], ['sapphire', 39], ['diamond', 52]];
    var RC = 2 * Math.PI * 56;
    var firstPaint = true;
    var reduceMotion = matchMedia('(prefers-reduced-motion:reduce)').matches;
    function ringProgress(current, tiers) {
      var prev = 0, i;
      for (i = 0; i < tiers.length; i++) {
        if (current < tiers[i][1]) return { p: (current - prev) / (tiers[i][1] - prev), toGo: tiers[i][1] - current, tier: tiers[i][0] };
        prev = tiers[i][1];
      }
      return { p: 1, toGo: 0, tier: null };
    }
    function setRing(prog, p, animate) {
      prog.style.strokeDasharray = RC;
      prog.style.transition = animate ? '' : 'none';
      prog.style.strokeDashoffset = RC * (1 - Math.max(0, Math.min(1, p)));
    }
    function paintHabit(cap, current, tiers, unit) {
      el('num' + cap).textContent = current;
      var t = ringProgress(current, tiers);
      setRing(el('ring' + cap), t.p, !firstPaint && !reduceMotion);
      el('goal' + cap).innerHTML = t.tier ? ('<b>' + t.toGo + '</b> ' + unit + ' to ' + TIER_CAP[t.tier]) : 'Maxed — Diamond earned';
    }

    function centerOf(elm) { var r = elm.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; }
    function tapPulse(controlEl) {
      var card = controlEl && controlEl.closest ? controlEl.closest('.hcard') : null;
      if (!card) return;
      card.classList.remove('tapped'); void card.offsetWidth; card.classList.add('tapped');
      var num = card.querySelector('.num');
      if (num) { num.classList.remove('bump'); void num.offsetWidth; num.classList.add('bump'); }
    }
    function fireBurst(cx, cy, n) {
      if (reduceMotion) return;
      for (var i = 0; i < n; i++) {
        var s = document.createElement('div'); s.className = 'spark';
        var sz = 6 + Math.random() * 7; s.style.width = sz + 'px'; s.style.height = sz + 'px';
        s.style.left = cx + 'px'; s.style.top = cy + 'px'; document.body.appendChild(s);
        var ang = Math.random() * Math.PI * 2, dist = 45 + Math.random() * 80;
        var a = s.animate([{ transform: 'translate(-50%,-50%)', opacity: 1 },
          { transform: 'translate(calc(-50% + ' + Math.cos(ang) * dist + 'px),calc(-50% + ' + Math.sin(ang) * dist + 'px)) scale(.2)', opacity: 0 }],
          { duration: 650 + Math.random() * 350, easing: 'cubic-bezier(.15,.7,.3,1)' });
        a.onfinish = function () { this.effect.target.remove(); };
      }
    }
    function buzz(pattern) { if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} } }
    function countUp(elm, from, to) {
      if (reduceMotion || from === to) { elm.textContent = to; return; }
      var start = null, dur = 520;
      (function step(ts) { if (!start) start = ts; var k = Math.min(1, (ts - start) / dur), e = 1 - Math.pow(1 - k, 3);
        elm.textContent = Math.round(from + (to - from) * e); if (k < 1) requestAnimationFrame(step); })(performance.now());
    }
    function mint(tier) {
      buzz([30, 40, 60]);
      fireBurst(window.innerWidth / 2, window.innerHeight * 0.38, 28);
      if (reduceMotion) return;
      var t = document.createElement('div'); t.className = 'toast';
      t.innerHTML = medalSvg(tier, false).replace('width="52" height="52"', 'width="120" height="120"') +
        '<div class="cap">' + TIER_CAP[tier] + ' unlocked</div>';
      document.body.appendChild(t);
      var a = t.animate([{ opacity: 0, transform: 'translate(-50%,-50%) scale(.4)' },
        { opacity: 1, transform: 'translate(-50%,-50%) scale(1.06)', offset: .45 },
        { opacity: 1, transform: 'translate(-50%,-50%) scale(1)', offset: .8 },
        { opacity: 0, transform: 'translate(-50%,-50%) scale(.9) translateY(-26px)' }],
        { duration: 1700, easing: 'ease' });
      a.onfinish = function () { t.remove(); };
    }
    function celebrateDaily() {
      buzz(20);
      fireBurst(window.innerWidth / 2, window.innerHeight * 0.4, 22);
      if (reduceMotion) return;
      var t = document.createElement('div'); t.className = 'toast';
      t.innerHTML = '<div class="cap">Locked in for today</div>';
      document.body.appendChild(t);
      var a = t.animate([{ opacity: 0, transform: 'translate(-50%,-50%) scale(.7)' },
        { opacity: 1, transform: 'translate(-50%,-50%) scale(1)', offset: .3 },
        { opacity: 1, transform: 'translate(-50%,-50%) scale(1)', offset: .75 },
        { opacity: 0, transform: 'translate(-50%,-50%) scale(1) translateY(-22px)' }],
        { duration: 1500, easing: 'ease' });
      a.onfinish = function () { t.remove(); };
    }
    function runCelebrations(prev, next) {
      var c = celebrationsFor(prev, next);
      c.countUp.forEach(function (h) {
        var cap = h.charAt(0).toUpperCase() + h.slice(1);
        countUp(el('num' + cap), prev.summary[h].current, next.summary[h].current);
      });
      c.mints.forEach(function (tier, i) { setTimeout(function () { mint(tier); }, i * 320); });
      c.waveBadges.forEach(function (name, i) { setTimeout(function () { mintWave(name); }, (c.mints.length + i) * 320); });
      if (c.dailyComplete) setTimeout(celebrateDaily, c.mints.length ? 400 : 0);
    }

    var METAL = { // radial-gradient stops per tier
      bronze: ['#f0b877', '#c17f3c', '#7d4a1c'], silver: ['#ffffff', '#c2ccd4', '#7f8a93'],
      gold: ['#fff2b0', '#e3bf47', '#9c7a15'], sapphire: ['#b9d9ff', '#3f7fca', '#1c3f76'],
      diamond: ['#ffffff', '#c8f6fb', '#5fb6c4'], comeback: ['#ffd9a8', '#d9743f', '#8a3a1a'],
    };
    var svgSeq = 0;
    var WAVE_TIERS = [['Ripple', 10], ['Swell', 50], ['Breaker', 100], ['Tide', 250], ['Ocean', 500]];
    function waveBadgeSvg(size) {
      var id = 'wv_' + (svgSeq++);
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 102 102">' +
        '<defs><radialGradient id="' + id + '" cx="40%" cy="30%" r="72%"><stop offset="0%" stop-color="#bfe6ff"/>' +
        '<stop offset="55%" stop-color="#3f7fca"/><stop offset="100%" stop-color="#1c3f76"/></radialGradient></defs>' +
        '<circle cx="51" cy="51" r="42" fill="url(#' + id + ')"/>' +
        '<path d="M20 58 q8 -12 16 0 t16 0 t16 0 t16 0" fill="none" stroke="#eaf6ff" stroke-width="4" stroke-linecap="round" opacity=".9"/>' +
        '<path d="M20 48 q8 -12 16 0 t16 0 t16 0 t16 0" fill="none" stroke="#eaf6ff" stroke-width="3" stroke-linecap="round" opacity=".5"/></svg>';
    }
    function currentWaveBadge(total) {
      var earned = null, next = null, i;
      for (i = 0; i < WAVE_TIERS.length; i++) {
        if (total >= WAVE_TIERS[i][1]) earned = WAVE_TIERS[i][0];
        else { next = WAVE_TIERS[i]; break; }
      }
      return { earned: earned, next: next, toGo: next ? next[1] - total : 0 };
    }
    function mintWave(name) {
      buzz([20, 40, 40]);
      fireBurst(window.innerWidth / 2, window.innerHeight * 0.4, 22);
      if (reduceMotion) return;
      var t = document.createElement('div'); t.className = 'toast';
      t.innerHTML = waveBadgeSvg(120) + '<div class="cap">' + name + '</div>';
      document.body.appendChild(t);
      var a = t.animate([{ opacity: 0, transform: 'translate(-50%,-50%) scale(.4)' },
        { opacity: 1, transform: 'translate(-50%,-50%) scale(1.06)', offset: .45 },
        { opacity: 1, transform: 'translate(-50%,-50%) scale(1)', offset: .8 },
        { opacity: 0, transform: 'translate(-50%,-50%) scale(.9) translateY(-26px)' }],
        { duration: 1700, easing: 'ease' });
      a.onfinish = function () { t.remove(); };
    }
    function paintUrges(s) {
      var total = (s.urges && s.urges.total) || 0, today = (s.urges && s.urges.today) || 0;
      el('urToday').textContent = today;
      el('urAll').textContent = total;
      var b = currentWaveBadge(total);
      el('waveBadge').innerHTML = b.earned ? waveBadgeSvg(30) : '';
    }
    var OV_DUR = 60000, BR_IN = 4000, BR_OUT = 6000;
    var ovCv, ovCtx, ovW, ovH, ovRaf = null, ovT0 = 0;
    function ovSize() { ovW = ovCv.width = innerWidth * devicePixelRatio; ovH = ovCv.height = innerHeight * devicePixelRatio; }
    function ovFrame(now) {
      var p = Math.min(1, (now - ovT0) / OV_DUR), env = Math.sin(p * Math.PI);
      var amp = (12 + env * 78) * devicePixelRatio, base = ovH * (0.80 - env * 0.28);
      ovCtx.clearRect(0, 0, ovW, ovH);
      var grad = ovCtx.createLinearGradient(0, base - amp, 0, ovH);
      grad.addColorStop(0, 'rgba(87,166,216,.55)'); grad.addColorStop(1, 'rgba(20,60,110,.85)');
      for (var layer = 0; layer < 2; layer++) {
        ovCtx.beginPath(); ovCtx.moveTo(0, ovH);
        var ph = now * (0.0016 + layer * 0.0007) + layer * 2, la = amp * (layer ? 0.6 : 1);
        for (var x = 0; x <= ovW; x += 8 * devicePixelRatio) ovCtx.lineTo(x, base - Math.sin(x / (120 * devicePixelRatio) + ph) * la);
        ovCtx.lineTo(ovW, ovH); ovCtx.closePath();
        ovCtx.fillStyle = layer ? 'rgba(47,128,184,.35)' : grad; ovCtx.fill();
      }
      var cyc = (now - ovT0) % (BR_IN + BR_OUT), inhale = cyc < BR_IN;
      var k = inhale ? cyc / BR_IN : 1 - (cyc - BR_IN) / BR_OUT;
      el('ovRing').style.transform = 'scale(' + (0.6 + 0.4 * k) + ')';
      el('ovWord').textContent = inhale ? 'Breathe in' : 'Breathe out';
      el('ovPhase').textContent = p < 0.4 ? 'Building' : p < 0.72 ? 'Cresting' : 'Passing';
      if (p >= 1) { ovFinish(); return; }
      ovRaf = requestAnimationFrame(ovFrame);
    }
    function ovFinish() {
      if (ovRaf) cancelAnimationFrame(ovRaf); ovRaf = null;
      el('ovPhase').textContent = 'It passed'; el('ovGuide').textContent = 'You rode it out.';
      el('ovWord').textContent = ''; el('ovRing').style.transform = 'scale(.6)';
      el('okBtn').style.display = 'none'; el('doneBtn').style.display = 'block';
      if (ovCtx) ovCtx.clearRect(0, 0, ovW, ovH);
    }
    function ovOpen() {
      if (!ovCv) { ovCv = el('ovCanvas'); ovCtx = ovCv.getContext('2d'); }
      el('ov').classList.add('on'); el('ov').setAttribute('aria-hidden', 'false');
      el('ovPhase').textContent = 'Building'; el('ovGuide').textContent = 'It rises and passes. Ride it.';
      el('okBtn').style.display = 'block'; el('doneBtn').style.display = 'none';
      ovSize(); ovT0 = performance.now(); ovRaf = requestAnimationFrame(ovFrame);
    }
    function ovClose() { if (ovRaf) cancelAnimationFrame(ovRaf); ovRaf = null; el('ov').classList.remove('on'); el('ov').setAttribute('aria-hidden', 'true'); }
    addEventListener('resize', function () { if (el('ov').classList.contains('on')) ovSize(); });
    var apiUrl = null;
    var el = function (id) { return document.getElementById(id); };
    var today = null;      // 'YYYY-MM-DD' from the server, set on first render
    var todayRow = {};     // this device's optimistic view of today's ticks
    var lastState = null;  // last server-confirmed state, for reverting failed optimistic writes

    /*__CELEB_START__*/
    function celebrationsFor(prev, next) {
      var PR = ['subuh', 'zohor', 'asar', 'maghrib', 'isya'];
      var TIERS = ['bronze', 'silver', 'gold', 'sapphire', 'diamond', 'comeback'];
      var out = { countUp: [], mints: [], dailyComplete: false, waveBadges: [] };
      if (!prev) return out;
      ['prayers', 'sober', 'workout'].forEach(function (h) {
        if (next.summary[h].current > prev.summary[h].current) out.countUp.push(h);
      });
      TIERS.forEach(function (t) {
        if ((next.summary.medals[t] || 0) > (prev.summary.medals[t] || 0)) out.mints.push(t);
      });
      var complete = function (st) {
        var d = null, i;
        for (i = 0; i < st.days.length; i++) if (st.days[i].date === st.today) d = st.days[i];
        if (!d) return false;
        return PR.every(function (p) { return d.prayers && d.prayers[p] === true; }) && d.sober === true;
      };
      if (complete(next) && !complete(prev)) out.dailyComplete = true;
      var WAVE = [['Ripple', 10], ['Swell', 50], ['Breaker', 100], ['Tide', 250], ['Ocean', 500]];
      var pt = (prev.summary.urges && prev.summary.urges.total) || 0;
      var nt = (next.summary.urges && next.summary.urges.total) || 0;
      WAVE.forEach(function (w) { if (pt < w[1] && nt >= w[1]) out.waveBadges.push(w[0]); });
      return out;
    }
    /*__CELEB_END__*/

    function medalSvg(tier, locked) {
      var m = METAL[tier];
      var id = 'g_' + tier + '_' + (svgSeq++);
      if (locked) {
        return '<svg width="52" height="52" viewBox="0 0 102 102"><circle cx="51" cy="51" r="40" fill="none" stroke="var(--edge)" stroke-width="2.5" stroke-dasharray="5 5"/></svg>';
      }
      return '<svg width="52" height="52" viewBox="0 0 102 102"><defs><radialGradient id="' + id + '" cx="38%" cy="30%" r="72%">' +
        '<stop offset="0%" stop-color="' + m[0] + '"/><stop offset="50%" stop-color="' + m[1] + '"/><stop offset="100%" stop-color="' + m[2] + '"/></radialGradient></defs>' +
        '<circle cx="51" cy="51" r="40" fill="url(#' + id + ')"/>' +
        '<rect x="34" y="34" width="34" height="34" rx="3" fill="' + m[2] + '" opacity=".5"/>' +
        '<rect x="34" y="34" width="34" height="34" rx="3" fill="' + m[2] + '" opacity=".5" transform="rotate(45 51 51)"/></svg>';
    }

    function dots(container, weekBools) {
      var names = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
      container.innerHTML = weekBools.map(function (on, i) {
        return '<span class="dot ' + (on ? 'on' : 'off') + '">' + names[i] + '</span>';
      }).join('');
    }

    function render(state) {
      lastState = state;
      var s = state.summary;
      today = state.today;                 // server owns "today" (MYT); day rolls at 00:00 UTC+8
      el('today').textContent = new Date(today + 'T00:00:00+08:00').toLocaleDateString('en-GB',
        { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Asia/Kuala_Lumpur' });
      var todayItem = findDay(state.days, today);
      todayRow = todayItem ? { prayers: Object.assign({}, todayItem.prayers), workout: todayItem.workout, sober: todayItem.sober, urges: todayItem.urges || 0 }
                           : { prayers: {}, workout: false, sober: false, urges: 0 };

      paintHabit('Prayers', s.prayers.current, DAY_TIERS, 'days');
      paintHabit('Sober', s.sober.current, DAY_TIERS, 'days');
      paintHabit('Workout', s.workout.current, WEEK_TIERS, 'weeks');
      paintUrges(s);

      renderAchievements(s);

      renderPrayers();
      el('soberToggle').className = 'toggle' + (todayRow.sober ? ' on' : '');
      el('soberToggle').textContent = todayRow.sober ? 'Clean today' : 'Mark clean today';
      el('workoutToggle').className = 'toggle' + (todayRow.workout ? ' on' : '');
      el('workoutToggle').textContent = todayRow.workout ? 'Trained today' : 'Log a session';
      el('workoutSessions').textContent = 'SESSIONS THIS WEEK · ' + s.workout.thisWeekSessions + '/' + s.workout.target;

      dots(el('prayerWeek'), s.prayers.thisWeek);
      dots(el('soberWeek'), s.sober.thisWeek);

      var wk = el('workoutWeek');
      wk.innerHTML = Array.from({ length: s.workout.target }, function (_, i) {
        return '<span class="dot ' + (i < s.workout.thisWeekSessions ? 'on' : 'off') + '">' + (i + 1) + '</span>';
      }).join('');

      firstPaint = false;
    }

    var STREAK_WHY = {
      bronze: 'a 7-day streak (4 weeks for workout)',
      silver: 'a 30-day streak (12 weeks)',
      gold: 'a 90-day streak (26 weeks)',
      sapphire: 'a 180-day streak (39 weeks)',
      diamond: 'a full year — 365 days (52 weeks)',
      comeback: 'rebuilding a streak to 7 days after a slip',
    };
    function acell(nm, art, ct, why) {
      var locked = ct === 0;
      return '<div class="amed ' + (locked ? 'locked' : '') + '" data-nm="' + nm + '" data-ct="' + ct + '" data-why="' + why + '">' +
        art + '<span class="nm">' + nm + '</span><span class="ct">' + (locked ? '—' : '×' + ct) + '</span></div>';
    }
    function renderAchievements(s) {
      el('awardsTotals').textContent = s.totals.medals + ' earned · best streak ' + s.totals.bestStreak + ' · ' + s.totals.daysTracked + ' days tracked';
      var cells = '';
      ['bronze', 'silver', 'gold', 'sapphire', 'diamond', 'comeback'].forEach(function (t) {
        cells += acell(TIER_CAP[t], medalSvg(t), s.medals[t] || 0, STREAK_WHY[t]);
      });
      var total = (s.urges && s.urges.total) || 0;
      WAVE_TIERS.forEach(function (w) {
        cells += acell(w[0], waveBadgeSvg(46), total >= w[1] ? 1 : 0, w[1] + ' urges ridden out');
      });
      el('awardsGrid').innerHTML = cells;
    }

    function renderPrayers() {
      el('prayerPills').innerHTML = PRAYERS.map(function (p) {
        var on = todayRow.prayers[p] === true;
        return '<button type="button" class="pill ' + (on ? 'on' : '') + '" data-p="' + p + '">' + LABELS[p] + '</button>';
      }).join('');
      var done = PRAYERS.filter(function (p) { return todayRow.prayers[p]; }).length;
      el('prayerNote').textContent = done === 5 ? 'All 5 in — locked in for today'
        : done + ' / 5 today — ' + (5 - done) + ' more before midnight to keep the streak alive.';
      Array.prototype.forEach.call(el('prayerPills').children, function (b) {
        b.addEventListener('click', function () {
          todayRow.prayers[b.dataset.p] = !todayRow.prayers[b.dataset.p];
          if (todayRow.prayers[b.dataset.p]) { tapPulse(b); var c = centerOf(b); fireBurst(c.x, c.y, 12); buzz(15); }
          renderPrayers();
          save();
        });
      });
    }

    function findDay(days, d) { for (var i = 0; i < days.length; i++) if (days[i].date === d) return days[i]; return null; }

    function banner(msg) { var b = el('banner'); if (!msg) { b.className = ''; return; } b.textContent = msg; b.className = 'show'; }

    function refresh() {
      if (!apiUrl) return;
      fetch(apiUrl + '?poll=' + POLL)
        .then(function (r) { return r.json(); })
        .then(function (state) { banner(''); render(state); })
        .catch(function () { banner("Can't reach the tracker — reopen the shared link to load your progress."); });
    }

    function save() {
      if (!apiUrl) { banner('Ticking only works on the shared link.'); return; }
      banner('');
      fetch(apiUrl, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ poll: POLL, date: today, prayers: todayRow.prayers, workout: todayRow.workout, sober: todayRow.sober, urges: todayRow.urges }),
      })
        .then(function (r) { if (!r.ok) throw new Error(); return r.json(); })
        .then(function (newState) {
          var prev = lastState;      // capture before render() overwrites lastState
          render(newState);
          runCelebrations(prev, newState);
        })
        .catch(function () {
          if (lastState) render(lastState);
          banner("Couldn't save — your change was undone. Check your connection and try again.");
        });
    }

    el('soberToggle').addEventListener('click', function () {
      todayRow.sober = !todayRow.sober;
      el('soberToggle').className = 'toggle' + (todayRow.sober ? ' on' : '');
      el('soberToggle').textContent = todayRow.sober ? 'Clean today' : 'Mark clean today';
      if (todayRow.sober) { tapPulse(el('soberToggle')); var c = centerOf(el('soberToggle')); fireBurst(c.x, c.y, 12); buzz(15); }
      save();
    });
    el('workoutToggle').addEventListener('click', function () {
      todayRow.workout = !todayRow.workout;
      el('workoutToggle').className = 'toggle' + (todayRow.workout ? ' on' : '');
      el('workoutToggle').textContent = todayRow.workout ? 'Trained today' : 'Log a session';
      if (todayRow.workout) { tapPulse(el('workoutToggle')); var c = centerOf(el('workoutToggle')); fireBurst(c.x, c.y, 12); buzz(15); }
      save();
    });

    el('urgeBtn').addEventListener('click', function () {
      todayRow.urges = (todayRow.urges || 0) + 1;      // the choice to surf is the win — bank on tap
      el('urToday').textContent = +el('urToday').textContent + 1;
      el('urAll').textContent = +el('urAll').textContent + 1;
      buzz(15);
      save();                                          // POST includes urges; response re-renders + wave-badge mint
      ovOpen();
    });
    el('okBtn').addEventListener('click', ovClose);
    el('doneBtn').addEventListener('click', ovClose);

    var selMedal = null;
    el('awardsGrid').addEventListener('click', function (e) {
      var c = e.target.closest ? e.target.closest('.amed') : null;
      if (!c) return;
      if (selMedal) selMedal.classList.remove('sel');
      selMedal = c; c.classList.add('sel');
      var ct = +c.dataset.ct, earned = ct > 0;
      el('explain').innerHTML = '<b>' + c.dataset.nm + (earned ? ' ×' + ct : '') + '</b> — ' +
        (earned ? 'earned for ' : 'not yet · earn it for ') + c.dataset.why + '.';
    });
    function showTab(which) {
      el('trackView').classList.toggle('on', which === 'track');
      el('awardsView').classList.toggle('on', which === 'awards');
      el('tabTrack').classList.toggle('on', which === 'track');
      el('tabAwards').classList.toggle('on', which === 'awards');
      scrollTo(0, 0);
    }
    el('tabTrack').addEventListener('click', function () { showTab('track'); });
    el('tabAwards').addEventListener('click', function () { showTab('awards'); });

    document.addEventListener('visibilitychange', function () { if (!document.hidden) refresh(); });

    fetch('./config.json')
      .then(function (r) { return r.json(); })
      .then(function (cfg) { apiUrl = cfg.voteApiUrl; refresh(); })
      .catch(function () { banner('This page is live only on the shared link.'); });
  })();
  </script>
</body>
</html>
